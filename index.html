<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}
body{background:#0f172a;color:white;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#1e293b;border-radius:16px;border-left:4px solid #38bdf8;padding:24px;width:100%;max-width:380px;}
h1{color:#38bdf8;font-size:20px;margin-bottom:18px;text-align:center;}
.status{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:bold;margin-bottom:14px;}
.ativo{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3);}
.vencido{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);}
.vencendo{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid rgba(245,158,11,.3);}
.linha{display:flex;justify-content:space-between;font-size:14px;color:#94a3b8;margin-bottom:8px;}
.linha span{color:#cbd5e1;}
.pix-box{background:#0f172a;border-radius:10px;padding:12px;margin:14px 0;}
.pix-chave{font-size:14px;color:#4ade80;word-break:break-all;margin-bottom:8px;}
button{width:100%;padding:12px;border:none;border-radius:10px;margin-bottom:10px;font-size:15px;cursor:pointer;font-weight:bold;}
.btn-copiar{background:#334155;color:white;}
.btn-whats{background:#25d366;color:white;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#22c55e;color:white;padding:10px 18px;border-radius:10px;font-size:13px;display:none;}
.erro-box{text-align:center;color:#f87171;}
</style>
</head>
<body>

<div class="card" id="conteudo">
    <p class="erro-box">Carregando...</p>
</div>

<div class="toast" id="toast">✅ Copiado!</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIGURAÇÃO FIXA (igual para todos os clientes).
   Edite aqui apenas o nome do sistema.
   Os dados de Pix e o WhatsApp de Suporte são lidos automaticamente
   das configurações salvas pelo Gestor de Clientes (mesmo localStorage/origem).
══════════════════════════════════════════════════════════ */
const CONFIG = {
    nomeSistema: "Área do Cliente"
};
/* ══════════════════════════════════════════════════════════ */

function obterConfigCompartilhada(){
    // Lê as configurações salvas pelo Gestor de Clientes
    // (https://john-archs.github.io/GestorClientes/), que usa o mesmo
    // domínio/origem, e por isso compartilha o mesmo localStorage.
    try{
        return JSON.parse(localStorage.getItem("configuracoes")) || {};
    }catch(erro){
        return {};
    }
}

function obterDadosPix(){
    const config = obterConfigCompartilhada();
    return {
        pixChave: config.pixChave || "",
        pixNome: config.pixNome || "",
        pixBanco: config.pixBanco || ""
    };
}

function decodificar(texto){
    // Formato compacto: nome|plano|valor|vencimento
    const partes = decodeURIComponent(escape(atob(texto))).split("|");
    return {
        nome: partes[0] || "",
        plano: partes[1] || "",
        valor: partes[2] || "",
        vencimento: partes[3] || ""
    };
}

function primeiroNome(nome){
    return (nome || "").trim().split(" ")[0];
}

function formatarData(data){
    if(!data || !data.includes("-")) return "-";
    let partes = data.split("-");
    if(partes.length < 3) return "-";
    return `${partes[2]}/${partes[1]}/${partes[0]}`;
}

function calcularDiasRestantes(vencimento){
    const hoje = new Date();
    const [ano,mes,dia] = vencimento.split("-").map(Number);
    const dataVenc = new Date(ano, mes-1, dia);
    hoje.setHours(0,0,0,0);
    dataVenc.setHours(0,0,0,0);
    return Math.round((dataVenc - hoje) / (1000*60*60*24));
}

let cliente = null;

function carregar(){
    const params = new URLSearchParams(window.location.search);
    const d = params.get("d");
    const container = document.getElementById("conteudo");

    if(!d){
        container.innerHTML = '<p class="erro-box">Link inválido ou incompleto.</p>';
        return;
    }

    try{
        cliente = decodificar(d);
    }catch(erro){
        container.innerHTML = '<p class="erro-box">Link inválido.</p>';
        return;
    }

    const dias = calcularDiasRestantes(cliente.vencimento);
    let statusClasse = "ativo", statusTexto = "ATIVO";
    if(dias < 0){ statusClasse = "vencido"; statusTexto = "VENCIDO"; }
    else if(dias <= 2){ statusClasse = "vencendo"; statusTexto = "VENCENDO"; }

    document.title = CONFIG.nomeSistema;

    const pix = obterDadosPix();
    const temPix = !!(pix.pixChave || pix.pixNome || pix.pixBanco);
    const configCompartilhada = obterConfigCompartilhada();
    const temWhatsapp = !!(configCompartilhada.whatsappSuporte || "").replace(/\D/g,"");

    container.innerHTML = `
        <h1>Olá, ${primeiroNome(cliente.nome)}!</h1>
        <div style="text-align:center;"><span class="status ${statusClasse}">${statusTexto}</span></div>
        <div class="linha"><span>Plano</span><span>${cliente.plano || "-"}</span></div>
        <div class="linha"><span>Valor</span><span>${cliente.valor || "-"}</span></div>
        <div class="linha"><span>Vencimento</span><span>${formatarData(cliente.vencimento)}</span></div>

        ${temPix ? `
        <div class="pix-box">
            <div class="linha"><span>Chave Pix</span></div>
            <div class="pix-chave" id="pixChave">${pix.pixChave}</div>
            <div class="linha"><span>${pix.pixNome}${pix.pixNome && pix.pixBanco ? " • " : ""}${pix.pixBanco}</span></div>
            <button class="btn-copiar" onclick="copiarPix()">📋 Copiar chave Pix</button>
        </div>
        ` : ""}

        ${temWhatsapp ? `<button class="btn-whats" onclick="abrirWhatsapp()">💬 Falar no WhatsApp</button>` : ""}
    `;
}

function copiarPix(){
    const pix = obterDadosPix();
    navigator.clipboard.writeText(pix.pixChave).then(mostrarToast).catch(()=>{
        const temp = document.createElement("textarea");
        temp.value = pix.pixChave;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand("copy");
        document.body.removeChild(temp);
        mostrarToast();
    });
}

function mostrarToast(){
    const toast = document.getElementById("toast");
    toast.style.display = "block";
    setTimeout(()=> toast.style.display = "none", 2000);
}

function abrirWhatsapp(){
    const config = obterConfigCompartilhada();
    const numero = (config.whatsappSuporte || "").replace(/\D/g,"");
    if(!numero) return;
    const mensagem = `Olá! Sou ${cliente.nome}, meu plano é ${cliente.plano}. Gostaria de falar sobre minha assinatura.`;
    window.open(`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`, "_blank");
}

carregar();
</script>
</body>
</html>
